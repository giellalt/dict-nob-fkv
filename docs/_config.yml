remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Norwegian Bokmål ⇒ Kven
description: An electronic dictionary from Norwegian Bokmål to Kven
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
